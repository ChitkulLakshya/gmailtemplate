<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/manifest.json">
  <title>Gate Pass · SNIST</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      height: 100%;
      background: #1a1a1a;
      font-family: 'Google Sans', Roboto, sans-serif;
      color: #e8e8e8;
    }

    body {
      max-width: 430px;
      margin: 0 auto;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .top-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(6px + env(safe-area-inset-top)) 8px 6px;
      flex-shrink: 0;
    }

    .nav-back,
    .nav-btn {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
    }

    .nav-back svg,
    .nav-btn svg {
      width: 22px;
      height: 22px;
      fill: #c8c8c8;
    }

    .nav-actions {
      display: flex;
      align-items: center;
    }

    .nav-menu-wrap {
      position: relative;
    }

    .nav-menu {
      position: absolute;
      top: 44px;
      right: 0;
      background: #2d2d2d;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      min-width: 160px;
      z-index: 200;
      overflow: hidden;
      display: none;
      flex-direction: column;
    }

    .nav-menu.open {
      display: flex;
    }

    .nav-menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      font-size: 14px;
      color: #e8e8e8;
      cursor: pointer;
      border: none;
      background: none;
      text-align: left;
      width: 100%;
      font-family: inherit;
    }

    .subject-area {
      padding: 2px 16px 12px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-shrink: 0;
    }

    .subject-text {
      font-size: 21px;
      font-weight: 400;
      color: #e8e8e8;
      line-height: 1.3;
    }

    .inbox-badge {
      display: inline-block;
      background: #3c4043;
      color: #bdc1c6;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 5px;
      font-weight: 500;
    }

    .star-btn {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .star-btn svg {
      width: 24px;
      height: 24px;
      fill: none;
      stroke: #9aa0a6;
      stroke-width: 1.5;
    }

    .star-btn.starred svg {
      fill: #f28b82;
      stroke: #f28b82;
    }

    .email-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 8px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .email-card {
      background: #111;
      border-radius: 16px;
      padding: 14px 16px;
    }

    .avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      font-weight: 600;
      color: #fff;
      flex-shrink: 0;
    }

    .avatar-student {
      background: #6b7fad;
    }

    .avatar-gatepass {
      background: #5c5f8a;
    }

    .email-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .email-meta {
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .sender-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 3px;
      gap: 4px;
    }

    /* Key fix: sender-name uses flex:1 + min-width:0 so it shrinks instead of pushing buttons */
    .sender-name {
      font-size: 14px;
      font-weight: 700;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .email-date {
      font-size: 12px;
      color: #9aa0a6;
      flex-shrink: 0;
      white-space: nowrap;
    }

    .email-to {
      font-size: 13px;
      color: #9aa0a6;
      margin-top: 2px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      user-select: none;
    }

    .chevron-v {
      width: 20px;
      height: 20px;
      fill: #9aa0a6;
      transition: transform 0.2s;
      margin-top: 1px;
    }

    .email-to.open .chevron-v {
      transform: rotate(180deg);
    }

    /* Action buttons always fixed width, never pushed */
    .reply-actions {
      display: flex;
      gap: 0;
      align-items: center;
      flex-shrink: 0;
    }

    .reply-icon-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
    }

    .reply-icon-btn svg {
      width: 19px;
      height: 19px;
      fill: #9aa0a6;
    }

    .email-details {
      display: none;
      margin: 8px 0 4px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 8px;
      font-size: 12px;
      color: #9aa0a6;
      line-height: 1.9;
    }

    .email-details.open {
      display: block;
    }

    .detail-row {
      display: flex;
      gap: 12px;
      margin-bottom: 2px;
    }

    .detail-label {
      min-width: 38px;
      color: #6b7280;
      flex-shrink: 0;
    }

    .detail-val {
      color: #c8cdd3;
      flex: 1;
      word-break: break-all;
    }

    .detail-lock {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      margin-top: 8px;
    }

    .detail-lock svg {
      width: 13px;
      height: 13px;
      fill: #9aa0a6;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .lock-link {
      color: #f28b82;
      cursor: pointer;
      font-size: 13px;
    }

    .student-body {
      font-size: 14px;
      color: #e8eaed;
      margin-top: 14px;
      line-height: 1.6;
      white-space: pre-line;
    }

    .approved-text {
      font-size: 14px;
      color: #e8eaed;
      margin: 14px 0 12px;
      line-height: 1.5;
    }

    .show-quoted {
      font-size: 13px;
      color: #8ab4f8;
      cursor: pointer;
      font-weight: 400;
    }

    .quoted-wrap {
      display: none;
    }

    .quoted-prefix {
      margin-top: 16px;
      margin-bottom: 4px;
      color: #9aa0a6;
      font-size: 13px;
      line-height: 1.45;
    }

    .quoted-body {
      margin-left: 8px;
      padding-left: 8px;
      border-left: 3px solid #5f6368;
      color: #bdc1c6;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
      white-space: pre-line;
    }

    .quick-replies {
      display: flex;
      gap: 10px;
      padding: 10px 12px 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
    }

    .quick-replies::-webkit-scrollbar {
      display: none;
    }

    .qr-btn {
      background: transparent;
      border: 1.5px solid #3c4043;
      border-radius: 20px;
      color: #e8e8e8;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 16px;
      white-space: nowrap;
      cursor: pointer;
      font-family: inherit;
    }

    .divider {
      height: 1px;
      background: #2a2a2a;
      flex-shrink: 0;
    }

    .bottom-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px 9px;
      gap: 8px;
      flex-shrink: 0;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #2e2e2e;
      border: none;
      border-radius: 28px;
      color: #e0e0e0;
      font-size: 14px;
      font-weight: 500;
      padding: 11px 16px;
      cursor: pointer;
      flex: 1;
      justify-content: center;
      font-family: inherit;
    }

    .action-btn svg {
      width: 18px;
      height: 18px;
      fill: #e0e0e0;
    }

    .action-btn-icon {
      width: 46px;
      height: 46px;
      background: #2e2e2e;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
    }

    .action-btn-icon svg {
      width: 22px;
      height: 22px;
      fill: #e0e0e0;
    }

    .android-nav {
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 10px 0 12px;
      background: #111;
      border-top: 1px solid #2a2a2a;
      flex-shrink: 0;
    }

    .android-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 44px;
      position: relative;
      cursor: pointer;
    }

    .android-nav-btn svg {
      width: 26px;
      height: 26px;
      fill: #c8c8c8;
    }

    .android-nav-btn.has-badge::after {
      content: '99+';
      position: absolute;
      top: 0;
      left: 32px;
      background: #ea4335;
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 10px;
      line-height: 16px;
    }

    .nav-home-bar {
      display: flex;
      justify-content: center;
      padding: 4px 0 calc(2px + env(safe-area-inset-bottom));
      background: #111;
    }

    .nav-home-pill {
      width: 130px;
      height: 4px;
      background: #555;
      border-radius: 2px;
    }

    #pwa-banner {
      display: none;
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #2d2d2d;
      border: 1px solid #3c4043;
      border-radius: 14px;
      padding: 12px 16px;
      z-index: 999;
      width: calc(100% - 32px);
      max-width: 398px;
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.6);
      align-items: center;
      gap: 12px;
    }

    #pwa-banner.show {
      display: flex;
    }

    #pwa-banner-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: #4a7a5a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    #pwa-install-btn {
      background: #8ab4f8;
      color: #0f1923;
      font-size: 13px;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      white-space: nowrap;
    }

    #pwa-dismiss-btn {
      background: none;
      border: none;
      color: #9aa0a6;
      font-size: 20px;
      cursor: pointer;
      flex-shrink: 0;
    }
  </style>
</head>

<body>

  <div id="pwa-banner">
    <div id="pwa-banner-icon">📋</div>
    <div style="flex:1;min-width:0;">
      <strong style="font-size:13px;display:block;color:#e8e8e8;">Gate Pass · SNIST</strong>
      <span style="font-size:12px;color:#9aa0a6;">Add to Home Screen for quick access</span>
    </div>
    <button id="pwa-install-btn">Install</button>
    <button id="pwa-dismiss-btn">✕</button>
  </div>

  <div class="top-nav">
    <div class="nav-back" onclick="history.back()"><svg viewBox="0 0 24 24">
        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z" />
      </svg></div>
    <div class="nav-actions">
      <div class="nav-btn"><svg viewBox="0 0 24 24">
          <path d="M19 9h-2v3h-3v2h3v3h2v-3h3v-2h-3zM4 8v2h2v2H4v2h4v-2h2v-2H8V8zm7 6v2h-2v2h4v-2h2v-2zM4 16v2h8v-2z" />
        </svg></div>
      <div class="nav-btn"><svg viewBox="0 0 24 24">
          <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
        </svg></div>
      <div class="nav-btn"><svg viewBox="0 0 24 24">
          <path
            d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" />
        </svg></div>
      <div class="nav-menu-wrap">
        <div class="nav-btn" id="threeDots"><svg viewBox="0 0 24 24">
            <path
              d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
          </svg></div>
        <div class="nav-menu" id="navMenu">
          <button class="nav-menu-item" onclick="window.location.href='/p1'"><svg viewBox="0 0 24 24">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg> Vinay (P1)</button>
          <button class="nav-menu-item" onclick="window.location.href='/p2'"><svg viewBox="0 0 24 24">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg> Lakshya (P2)</button>
          <button class="nav-menu-item" onclick="window.location.href='/p3'"><svg viewBox="0 0 24 24">
              <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
            </svg> Prem Sai (P3)</button>
        </div>
      </div>
    </div>
  </div>

  <div class="subject-area">
    <div>
      <div class="subject-text" id="subjectLine">Requesting for gate pass</div><span class="inbox-badge">Inbox</span>
    </div>
    <div class="star-btn" id="starBtn"><svg viewBox="0 0 24 24">
        <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26" />
      </svg></div>
  </div>

  <div class="email-list">

    <!-- Card 1: Student -->
    <div class="email-card">
      <div class="email-header">
        <div class="avatar avatar-student" id="av1">A</div>
        <div class="email-meta">
          <div class="sender-row">
            <span class="sender-name" id="senderName1">23311A04...</span>
            <span class="email-date" id="emailDate1">Mar 25</span>
          </div>
          <div class="email-to" id="detailsToggle1">
            <span>to Gatepass</span>&nbsp;<svg class="chevron-v" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
          </div>
        </div>
        <div class="reply-actions">
          <!-- Smiley -->
          <div class="reply-icon-btn"><svg viewBox="0 0 24 24">
              <path
                d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" />
            </svg></div>
          <!-- Reply -->
          <div class="reply-icon-btn"><svg viewBox="0 0 24 24">
              <path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z" />
            </svg></div>
          <!-- Three dots -->
          <div class="reply-icon-btn"><svg viewBox="0 0 24 24">
              <path
                d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
            </svg></div>
        </div>
      </div>
      <div class="email-details" id="emailDetails1">
        <div class="detail-row"><span class="detail-label">From</span><span class="detail-val" id="detailFrom1">—</span>
        </div>
        <div class="detail-row"><span class="detail-label">To</span><span class="detail-val" id="detailTo1">—</span>
        </div>
        <div class="detail-row"><span class="detail-label">Date</span><span class="detail-val" id="detailDate1">—</span>
        </div>
        <div class="detail-lock"><span class="lock-link">View security details</span></div>
      </div>
      <div class="student-body" id="studentBody"></div>
    </div>

    <!-- Card 2: Gatepass reply -->
    <div class="email-card">
      <div class="email-header">
        <div class="avatar avatar-gatepass">G</div>
        <div class="email-meta">
          <div class="sender-row">
            <span class="sender-name" id="replyFrom">Gatepass...</span>
            <span class="email-date" id="replyTime">...</span>
          </div>
          <div class="email-to" id="detailsToggle2">
            <span>to me, Gate</span>&nbsp;<svg class="chevron-v" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
          </div>
        </div>
        <div class="reply-actions">
          <div class="reply-icon-btn"><svg viewBox="0 0 24 24">
              <path
                d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" />
            </svg></div>
          <div class="reply-icon-btn"><svg viewBox="0 0 24 24">
              <path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z" />
            </svg></div>
          <div class="reply-icon-btn"><svg viewBox="0 0 24 24">
              <path
                d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" />
            </svg></div>
        </div>
      </div>
      <div class="email-details" id="emailDetails2">
        <div class="detail-row"><span class="detail-label">From</span><span class="detail-val" id="detailFrom2">—</span>
        </div>
        <div class="detail-row"><span class="detail-label">To</span><span class="detail-val" id="detailTo2">—</span>
        </div>
        <div class="detail-row"><span class="detail-label">Date</span><span class="detail-val" id="detailDate2">—</span>
        </div>
        <div class="detail-lock">
          <svg viewBox="0 0 24 24">
            <path
              d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z" />
          </svg>
          <div style="display:flex;flex-direction:column;gap:3px;color:#9aa0a6;">
            <span>Standard encryption (TLS).</span>
            <span class="lock-link">View security details</span>
          </div>
        </div>
      </div>
      <div class="approved-text">Your request is approved.</div>
      <div class="show-quoted" id="quotedToggle">Hide quoted text</div>
      <div class="quoted-wrap" id="quotedWrap" style="display:block">
        <div class="quoted-prefix" id="quotedPrefix"></div>

  <script>
    function truncateRoll(roll, max) {
      max = max || 10;
      return roll.length > max ? roll.slice(0, max) + '...' : roll;
    }
    function timeAgo(ts) {
      var diff = Math.floor((Date.now() - ts) / 1000);
      if (diff < 60) return 'Just now';
      if (diff < 3600) return Math.floor(diff / 60) + ' min ago';
      if (diff < 86400) return Math.floor(diff / 3600) + ' hrs ago';
      return Math.floor(diff / 86400) + ' days ago';
    }
    function bindToggle(toggleId, detailsId) {
      var t = document.getElementById(toggleId);
      var d = document.getElementById(detailsId);
      t.addEventListener('click', function (e) {
        e.stopPropagation();
        t.classList.toggle('open');
        d.classList.toggle('open');
      });
    }

    document.getElementById('starBtn').addEventListener('click', function () {
      this.classList.toggle('starred');
    });

    var token = new URLSearchParams(window.location.search).get('t');
    if (token) localStorage.setItem('gp-last-token', token);

    function init() {
      // Configuration for different routes (/p1, /p2, /p3)
      var path = window.location.pathname;
      var d = {};

      if (path === '/p2') {
        d = {
          name: "Chitkul Lakshya",
          rollno: "23311A05Q4",
          branch: "CSE",
          section: "D",
          emailid: "23311a05q4@cse.sreenidhi.edu.in",
          subject: "Requesting for gate pass",
          reason: "Sir, I have a medical appointment scheduled for 2:00 PM today. I kindly request your permission to leave the campus to attend it.",
          monthwithdate: "20-04-2026",
          time: "11:52 AM"
        };
      } else if (path === '/p3') {
        d = {
          name: "Kota Prem Sai",
          rollno: "23311A04L9",
          branch: "ECE",
          section: "D",
          emailid: "23311a04l9@ece.sreenidhi.edu.in",
          subject: "Requesting for gate pass",
          reason: "Sir, I have some urgent bank-related work that requires my presence at home today. I request you to kindly grant me permission to leave early.",
          monthwithdate: "20-04-2026",
          time: "11:52 AM"
        };
      } else {
        // Default or /p1
        d = {
          name: "Tammali Vinay",
          rollno: "23311A05EZ",
          branch: "CSE",
          section: "G",
          emailid: "23311a05ez@cse.sreenidhi.edu.in",
          subject: "Requesting for gate pass",
          reason: "Sir, I am currently experiencing severe health issues and have been advised to take immediate rest. I kindly request you to grant me a gate pass to go home.",
          monthwithdate: "20-04-2026",
          time: "11:52 AM"
        };
      }

      var branch = (d.branch || 'ECE').toUpperCase();
      var name = d.name || 'Student';
      var emailid = d.emailid || '';
      var rollno = d.rollno || '';
      var reason = d.reason || '';
      var subject = d.subject || 'Requesting for gate pass';
      var dateShort = d.monthwithdate || new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      var timeStr = d.time || '10:00 AM';

      document.getElementById('subjectLine').textContent = subject;

      // Card 1
      document.getElementById('av1').textContent = name.trim()[0].toUpperCase();
      var branchArr = branch.trim().split(/\s+/);
      var course = branchArr[0] || 'ECE';
      var sec = d.section ? ' (' + d.section + ') ' : ' ';
      var fullNameDisplay = rollno.toUpperCase() + sec + name;
      document.getElementById('senderName1').textContent = fullNameDisplay;
      document.getElementById('emailDate1').textContent = dateShort;
      document.getElementById('detailFrom1').innerHTML =
        fullNameDisplay + ' &bull; ' + emailid;
      document.getElementById('detailTo1').innerHTML =
        'Gatepass ' + course + ' &bull; ' + course.toLowerCase() + '-gatepass@sreenidhi.edu.in';
      document.getElementById('detailDate1').textContent = dateShort + ', ' + timeStr;
      document.getElementById('studentBody').textContent = reason;

      // Card 2
      var parsedTimestamp = Date.parse(dateShort + ' ' + new Date().getFullYear() + ' ' + timeStr);
      var timeAgoStr = !isNaN(parsedTimestamp) ? timeAgo(parsedTimestamp) : dateShort;

      document.getElementById('replyFrom').textContent = 'Gatepass ' + course;
      document.getElementById('replyTime').textContent = timeAgoStr;
      document.getElementById('detailFrom2').innerHTML =
        'Gatepass ' + course + ' &bull; ' + course.toLowerCase() + '-gatepass@sreenidhi.edu.in';
      document.getElementById('detailTo2').innerHTML =
        fullNameDisplay + ' &bull; ' + emailid + '<br>Gatepass SNIST &bull; gatepass@sreenidhi.edu.in';
      
      var parsedDateObj = new Date(dateShort + ' ' + new Date().getFullYear() + ' ' + timeStr);
      var fullDateStr = !isNaN(parsedDateObj) ? parsedDateObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' }) : (dateShort + ', ' + new Date().getFullYear());
      document.getElementById('detailDate2').textContent = fullDateStr + ', ' + timeStr;
      
      document.getElementById('quotedPrefix').innerHTML =
        'On ' + fullDateStr + ' at ' + timeStr + ' ' + fullNameDisplay +
        ' &lt;<span style="color:#8ab4f8">' + emailid + '</span>&gt; wrote:';
      document.getElementById('quotedBody').textContent = reason;

      bindToggle('detailsToggle1', 'emailDetails1');
      bindToggle('detailsToggle2', 'emailDetails2');

      document.getElementById('quotedToggle').addEventListener('click', function (e) {
        e.stopPropagation();
        var w = document.getElementById('quotedWrap');
        var vis = w.style.display === 'block';
        w.style.display = vis ? 'none' : 'block';
        this.textContent = vis ? 'Show quoted text' : 'Hide quoted text';
      });

      document.getElementById('threeDots').addEventListener('click', function (e) {
        e.stopPropagation();
        document.getElementById('navMenu').classList.toggle('open');
      });
      document.addEventListener('click', function () {
        document.getElementById('navMenu').classList.remove('open');
      });
    }

    function showExpired(msg) {
      // Removed expired view
    }

    init();

    // PWA
    var deferredPrompt = null;
    var banner = document.getElementById('pwa-banner');
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault();
      deferredPrompt = e;
      setTimeout(function () { banner.classList.add('show'); }, 1500);
    });
    document.getElementById('pwa-install-btn').addEventListener('click', function () {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function () {
        deferredPrompt = null;
        banner.classList.remove('show');
      });
    });
    document.getElementById('pwa-dismiss-btn').addEventListener('click', function () {
      banner.classList.remove('show');
    });
    window.addEventListener('appinstalled', function () {
      banner.classList.remove('show');
      deferredPrompt = null;
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(console.error);
  </script>
